# Railway config for the FastAPI backend.
# In the service Settings, set Root Directory to `backend` (monorepo).
# Config path from repo root: /backend/railway.toml
#
# Required Variables (Railway → Variables):
#   SECRET_KEY          — openssl rand -hex 32
#   DATABASE_URL        — Supabase connection string (URI), or POSTGRES_* × 4 + PROJECT_NAME
# See backend/.env.example for the full list.

[build]
builder = "RAILPACK"
watchPatterns = ["/backend/**"]

[deploy]
# Run Alembic migrations before serving. Alembic is idempotent — if the
# DB is already at head, it is a no-op. If a migration fails, uvicorn
# never starts, so we fail loudly rather than serve against a stale
# schema (e.g. booking.started_at / ended_at added in d5e6f7a8b9c0).
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
