# Railway config for the FastAPI backend.
# In the service Settings, set Root Directory to `backend` (monorepo).
# Config path from repo root: /backend/railway.toml

[build]
builder = "RAILPACK"
watchPatterns = ["/backend/**"]

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
